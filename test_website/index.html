<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>个人简介 - 张三</title>
    <style>
        /* === Reset & Base === */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
                "Helvetica Neue", Arial, "Noto Sans SC", sans-serif;
            background: #0d1117;
            color: #c9d1d9;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 2rem 1rem;
        }

        /* === Card Container === */
        .card {
            max-width: 720px;
            width: 100%;
            background: #161b22;
            border: 1px solid #30363d;
            border-radius: 16px;
            padding: 2.5rem 2rem;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
            transition: transform 0.2s ease;
        }

        .card:hover {
            transform: translateY(-2px);
        }

        /* === Header / Avatar === */
        .header {
            display: flex;
            align-items: center;
            gap: 1.5rem;
            margin-bottom: 2rem;
            flex-wrap: wrap;
        }

        .avatar {
            flex-shrink: 0;
            width: 100px;
            height: 100px;
            border-radius: 50%;
            background: linear-gradient(135deg, #58a6ff, #3fb950);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.5rem;
            font-weight: 700;
            color: #0d1117;
        }

        .header-text h1 {
            font-size: 2rem;
            font-weight: 700;
            color: #f0f6fc;
        }

        .header-text .tagline {
            font-size: 1rem;
            color: #8b949e;
            margin-top: 0.25rem;
        }

        /* === Bio === */
        .bio {
            background: #0d1117;
            border-left: 4px solid #58a6ff;
            padding: 1rem 1.25rem;
            border-radius: 0 8px 8px 0;
            margin-bottom: 2rem;
            line-height: 1.7;
            font-size: 1rem;
        }

        /* === Section Title === */
        .section-title {
            font-size: 1.125rem;
            font-weight: 600;
            color: #f0f6fc;
            margin-bottom: 1rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .section-title::after {
            content: "";
            flex: 1;
            height: 1px;
            background: #30363d;
        }

        /* === Skills Grid === */
        .skills-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
            gap: 0.75rem;
            list-style: none;
        }

        .skills-grid li {
            background: #0d1117;
            border: 1px solid #30363d;
            border-radius: 8px;
            padding: 0.6rem 1rem;
            text-align: center;
            font-size: 0.9rem;
            transition: all 0.2s ease;
            cursor: default;
        }

        .skills-grid li:hover {
            border-color: #58a6ff;
            background: #161b22;
            transform: scale(1.04);
        }

        /* === Footer === */
        .footer {
            margin-top: 2rem;
            padding-top: 1.25rem;
            border-top: 1px solid #30363d;
            text-align: center;
            font-size: 0.85rem;
            color: #8b949e;
        }

        .footer a {
            color: #58a6ff;
            text-decoration: none;
        }

        .footer a:hover {
            text-decoration: underline;
        }

        /* === Responsive === */
        @media (max-width: 480px) {
            .card {
                padding: 1.5rem 1rem;
            }

            .header {
                flex-direction: column;
                text-align: center;
                gap: 0.75rem;
            }

            .avatar {
                width: 80px;
                height: 80px;
                font-size: 2rem;
            }

            .header-text h1 {
                font-size: 1.5rem;
            }

            .skills-grid {
                grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
            }
        }
    </style>
</head>
<body>
    <div class="card">
        <!-- Header -->
        <div class="header">
            <div class="avatar">张</div>
            <div class="header-text">
                <h1>张三</h1>
                <p class="tagline">全栈开发者 · 开源爱好者</p>
            </div>
        </div>

        <!-- Bio -->
        <div class="bio">
            👋 你好！我是张三，一名热爱技术的全栈开发者。
            拥有 5 年以上 Web 开发经验，专注于构建高性能、用户友好的应用。
            空闲时喜欢折腾开源项目、撰写技术博客，以及探索 AI 与前端工程的结合点。
        </div>

        <!-- Skills -->
        <div class="section-title">🛠️ 技能清单</div>
        <ul class="skills-grid">
            <li>HTML / CSS</li>
            <li>JavaScript / TS</li>
            <li>React / Vue</li>
            <li>Node.js</li>
            <li>Python</li>
            <li>Docker</li>
            <li>Git / CI/CD</li>
            <li>PostgreSQL</li>
        </ul>

        <!-- Footer -->
        <div class="footer">
            📮 联系我：<a href="mailto:zhangsan@example.com">zhangsan@example.com</a>
            &nbsp;·&nbsp; 🌐 <a href="#">GitHub</a>
        </div>
    </div>
</body>
</html>
