repos:
  - repo: local
    hooks:
      - id: ruff-check
        name: ruff check (--fix)
        entry: ruff check --fix
        language: system
        types: [python]
        files: ^(src|tests)/
      - id: ruff-format
        name: ruff format
        entry: ruff format
        language: system
        types: [python]
        files: ^(src|tests)/
      - id: mypy
        name: mypy --strict src/
        entry: mypy
        language: system
        types: [python]
        args: [--strict, src/]
        files: ^src/
        pass_filenames: false
